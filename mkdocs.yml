site_name: GloboDocs
site_description: Portal Corporativo de Documentação e Base de Conhecimento - Globo Pharma
site_author: TI Corporativa
site_url: https://github.com/GloboPharma/GloboDocs

repo_url: https://github.com/GloboPharma/GloboDocs
repo_name: GloboPharma/GloboDocs
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/LogoLaranja.png
  favicon: assets/favicon.png
  language: pt-BR

  palette:
    - scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Modo claro
features:
  - navigation.instant
  - navigation.tracking
  - navigation.top
  - toc.integrate
  - search.highlight
  - search.suggest
  - content.code.copy

plugins:
  - search

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

